[build]
  command = "bash build.sh"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

# Configurar en Netlify → Site settings → Build & deploy → Environment:
# Key: ANTHROPIC_API_KEY
# Value: sk-ant-... (tu API key de Anthropic)
# Marcar como Secret para no exponerla en logs
